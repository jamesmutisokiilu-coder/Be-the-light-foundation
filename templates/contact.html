<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Be The Light Foundation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.header{
    text-align:center;
    color:white;
    padding:60px 20px;
}

.header h1{
    font-size:3rem;
    color:#FFD700;
}

.header p{
    margin-top:10px;
    font-size:1.2rem;
}

/* UPDATED: single column layout */
.container{
    width:90%;
    max-width:800px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr;
    gap:30px;
    padding-bottom:50px;
}

.contact-info{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    color:white;
    border:1px solid rgba(255,255,255,.2);
}

.contact-info h2{
    color:#FFD700;
    margin-bottom:25px;
}

.info{
    margin-bottom:25px;
    display:flex;
    align-items:center;
    gap:15px;
}

.info i{
    color:#FFD700;
    font-size:25px;
}

.info a{
    color:white;
    text-decoration:none;
}

.info a:hover{
    color:#FFD700;
}

.image-box{
    margin-top:25px;
    overflow:hidden;
    border-radius:15px;
}

.image-box img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.socials{
    margin-top:20px;
}

.socials a{
    color:#FFD700;
    font-size:28px;
    margin-right:15px;
    text-decoration:none;
}

.socials a:hover{
    color:white;
}

.back{
    text-align:center;
    margin-top:30px;
}

.back a{
    background:#FFD700;
    color:black;
    text-decoration:none;
    padding:12px 30px;
    border-radius:50px;
    font-weight:bold;
}

.footer{
    text-align:center;
    color:white;
    padding:20px;
    background:rgba(0,0,0,.4);
}

@media(max-width:900px){
    .header h1{
        font-size:2.2rem;
    }
}

</style>

</head>
<body>

<div class="header">
    <h1>Contact Us</h1>
    <p>We would love to hear from you.</p>
</div>

<div class="container">

    <div class="contact-info">

        <h2>Get In Touch</h2>

        <div class="info">
            <i class="fas fa-phone"></i>
            <a href="tel:+254712345678">
                +254 712 345 678
            </a>
        </div>

        <div class="info">
            <i class="fas fa-envelope"></i>
            <a href="mailto:info@bethelightfoundation.org">
                info@bethelightfoundation.org
            </a>
        </div>

        <div class="info">
            <i class="fas fa-location-dot"></i>
            <span>Nairobi, Kenya</span>
        </div>

        <div class="info">
            <i class="fas fa-clock"></i>
            <span>Monday - Friday: 8:00 AM - 5:00 PM</span>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>

        <div class="image-box">
            <img src="/static/images/img.jpeg"
                 alt="Manager">
        </div>

    </div>

</div>

<div class="back">
    <a href="/dashboard">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
    </a>
</div>

<br>

<div class="footer">
    © 2026 Be The Light Foundation | Uplifting Others, Reaching Higher
</div>

</body>
</html>
