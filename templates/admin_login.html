<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;

    /* BETTER "BE THE LIGHT" STYLE BACKGROUND */
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
    url('https://images.unsplash.com/photo-1509099836639-18ba1795216d?auto=format&fit=crop&w=1600&q=80');

    background-size:cover;
    background-position:center;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:rgba(255,255,255,.1);
    padding:30px;
    border-radius:15px;
    width:320px;
    backdrop-filter:blur(10px);
    text-align:center;
}

h2{
    color:#00e5ff;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#00e5ff;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:white;
}
</style>

</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <form method="POST" action="/admin-login">
        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
